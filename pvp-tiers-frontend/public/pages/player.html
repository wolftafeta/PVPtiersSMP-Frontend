<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player — PVP Tiers SMP</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="../../index.html"><img src="../../assets/smp-logo.png" alt="SMP"><span>PVP Tiers SMP</span></a>
  <div class="nav-links">
    <a class="nav-link" href="../../index.html">Home</a>
    <a class="nav-link" href="players.html">Players</a>
    <a class="nav-link" href="leaderboard.html">Leaderboard</a>
    <a class="nav-link" href="stats.html">Statistics</a>
    <span id="nav-management" style="display:none"><a class="nav-link" href="management.html">Management</a></span>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleTheme()">☀</button>
    <div id="nav-auth"></div>
  </div>
</nav>

<div class="container page">
  <div id="player-content">
    <div class="empty"><div class="empty-icon">⚔</div><div>Loading player...</div></div>
  </div>
</div>

<script src="../js/config.js"></script>
<script>
if (localStorage.getItem('pvp-dark') === '1') document.documentElement.classList.add('dark');
function toggleTheme() { const d = document.documentElement.classList.toggle('dark'); localStorage.setItem('pvp-dark', d ? '1' : '0'); }
handleAuthCallback();

function renderNav() {
  const user = Auth.getUser();
  document.getElementById('nav-auth').innerHTML = user
    ? `<div class="nav-user"><img src="${avatarUrl(user.discordId, user.avatar)}" alt=""><span>${user.discordName}</span><span class="role-badge ${user.role}">${user.role}</span></div><button class="btn btn-ghost btn-sm" onclick="Auth.clear();location.reload()">Logout</button>`
    : `<a href="${CONFIG.API_BASE}/auth/discord" class="btn discord-btn btn-sm">Login</a>`;
  if (Auth.isStaff()) document.getElementById('nav-management').style.display = '';
}
renderNav();

function warnColor(w) {
  if (w >= 3) return 'var(--red)';
  if (w >= 2) return 'var(--amber)';
  if (w >= 1) return 'var(--blue)';
  return 'var(--text3)';
}

function peakReqs(tier) {
  if (tier === 'LT2') return [{ d: 2, days: 30 }, { d: 1, days: 45 }];
  if (tier === 'HT2') return [{ d: 2, days: 30 }, { d: 1, days: 60 }, { d: 0, days: 90 }];
  return [{ d: 2, days: 30 }, { d: 1, days: 45 }, { d: 0, days: 65 }];
}

async function loadPlayer() {
  const ign = new URLSearchParams(location.search).get('ign');
  if (!ign) { document.getElementById('player-content').innerHTML = '<div class="empty"><div>No player specified.</div></div>'; return; }

  const p = await api(`/api/public/player/ign/${encodeURIComponent(ign)}`);
  if (p.error) { document.getElementById('player-content').innerHTML = `<div class="empty"><div>Player not found: ${ign}</div></div>`; return; }

  const hasPeak = ['LT2','HT2','LT1','HT1'].includes(p.tier);
  const reqs = hasPeak ? peakReqs(p.tier) : [];
  const totalGames = (p.wins || 0) + (p.losses || 0);

  document.title = `${p.ign} — PVP Tiers SMP`;

  document.getElementById('player-content').innerHTML = `
    <!-- Back -->
    <a href="players.html" class="btn btn-ghost btn-sm" style="margin-bottom:20px;">← Back to Players</a>

    <!-- Profile header -->
    <div class="card" style="padding:28px;">
      <div style="display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap;">

        <!-- Skin -->
        <div style="text-align:center;flex-shrink:0;">
          <img
            src="${p.skinUrl || `https://mc-heads.net/body/${p.uuid || 'steve'}/600`}"
            class="skin-img"
            style="width:120px;height:160px;object-fit:cover;"
            onerror="this.src='https://mc-heads.net/body/steve/600'">
          <div style="margin-top:10px;">
            <a href="https://namemc.com/profile/${p.uuid}" target="_blank" class="btn btn-ghost btn-xs">NameMC</a>
          </div>
        </div>

        <!-- Info -->
        <div style="flex:1;min-width:200px;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;">
            <span style="font-size:28px;font-weight:900;letter-spacing:-0.5px;">${p.ign}</span>
            ${tierBadge(p.tier)}
            ${p.peakTier ? '<span class="badge b-amber">⭐ Peak Tier</span>' : ''}
            ${p.retirementEligible ? '<span class="badge b-teal">Retirement Eligible</span>' : ''}
            ${p.cooldownPaused ? '<span class="badge b-gray">LOA</span>' : ''}
          </div>
          <div class="mono" style="margin-bottom:16px;font-size:11px;">${p.uuid || '—'}</div>

          <!-- Stats grid -->
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;">
            <div style="background:var(--bg3);border-radius:var(--r);padding:12px;text-align:center;">
              <div class="stat-label">Wins</div>
              <div style="font-size:22px;font-weight:900;color:var(--green)">${p.wins}</div>
            </div>
            <div style="background:var(--bg3);border-radius:var(--r);padding:12px;text-align:center;">
              <div class="stat-label">Losses</div>
              <div style="font-size:22px;font-weight:900;color:var(--red)">${p.losses}</div>
            </div>
            <div style="background:var(--bg3);border-radius:var(--r);padding:12px;text-align:center;">
              <div class="stat-label">Winrate</div>
              <div style="font-size:22px;font-weight:900;color:var(--blue)">${totalGames ? formatWinrate(p.winrate) : '—'}</div>
            </div>
            <div style="background:var(--bg3);border-radius:var(--r);padding:12px;text-align:center;">
              <div class="stat-label">Total Games</div>
              <div style="font-size:22px;font-weight:900;">${totalGames}</div>
            </div>
          </div>
        </div>

        <!-- T2+ stats (if applicable) -->
        ${hasPeak ? `
        <div style="min-width:180px;">
          <div class="card-title" style="margin-bottom:14px;">T2+ Status</div>

          <div style="margin-bottom:14px;">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;">
              <span style="color:var(--text2)">Warns</span>
              <span style="font-weight:700;color:${warnColor(p.warns)}">${p.warns}/3</span>
            </div>
            <div class="warn-bar" style="width:100%;">
              <div class="warn-fill" style="width:${Math.min(100, p.warns/3*100)}%;background:${warnColor(p.warns)}"></div>
            </div>
          </div>

          <div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border);">
            <span style="color:var(--text2)">Defenses</span>
            <span class="badge b-blue">${p.defenses}/2 🛡</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border);">
            <span style="color:var(--text2)">Days Held</span>
            <span style="font-weight:700;">${p.daysHeld}d</span>
          </div>
          ${p.tier === 'HT3' || p.points > 0 ? `
          <div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;">
            <span style="color:var(--text2)">HT3 Points</span>
            <span style="font-weight:700;color:var(--blue)">${p.points}</span>
          </div>` : ''}
        </div>` : ''}
      </div>
    </div>

    <!-- Peak tier progress -->
    ${hasPeak ? `
    <div class="card">
      <div class="card-header"><div class="card-title">Peak Tier Requirements — ${p.tier}</div></div>
      ${reqs.map(r => {
        const defOk = p.defenses >= r.d;
        const daysOk = p.daysHeld >= r.days;
        const met = defOk && daysOk;
        const progress = daysOk ? 100 : Math.round(p.daysHeld / r.days * 100);
        return `
        <div style="padding:12px 0;border-bottom:1px solid var(--border);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-size:13px;">${r.d} defense(s) + ${r.days} days held</span>
            <span class="badge ${met ? 'b-green' : 'b-gray'}">${met ? '✓ Met' : `${p.daysHeld}/${r.days}d`}</span>
          </div>
          <div style="height:4px;background:var(--bg4);border-radius:99px;overflow:hidden;">
            <div style="height:100%;width:${progress}%;background:${met ? 'var(--green)' : 'var(--blue)'};border-radius:99px;transition:width 0.6s;"></div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- Discord info (if logged in) -->
    ${Auth.isStaff() ? `
    <div class="card">
      <div class="card-header"><div class="card-title">Staff Info</div><span class="badge b-amber">Staff only</span></div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">
        <span style="color:var(--text2)">Discord ID</span>
        <span class="mono">${p.discordId}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;">
        <span style="color:var(--text2)">Discord Name</span>
        <span>${p.discordName}</span>
      </div>
    </div>` : ''}
  `;
}

loadPlayer();
</script>
</body>
</html>
