<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players — PVP Tiers SMP</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="../../index.html"><img src="../../assets/smp-logo.png" alt="SMP"><span>PVP Tiers SMP</span></a>
  <div class="nav-links">
    <a class="nav-link" href="../../index.html">Home</a>
    <a class="nav-link active" href="players.html">Players</a>
    <a class="nav-link" href="leaderboard.html">Leaderboard</a>
    <a class="nav-link" href="stats.html">Statistics</a>
    <span id="nav-management" style="display:none"><a class="nav-link" href="management.html">Management</a></span>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleTheme()">☀</button>
    <div id="nav-auth"></div>
  </div>
</nav>

<div class="container page">
  <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <div>
      <div class="page-title">All Players</div>
      <div class="page-sub" id="player-count">Loading...</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <input class="search-input" id="search" placeholder="Search IGN..." oninput="renderPlayers()">
      <select class="form-select" style="width:140px" id="tier-filter" onchange="renderPlayers()">
        <option value="">All tiers</option>
        <option value="HT1">HT1</option>
        <option value="LT1">LT1</option>
        <option value="HT2">HT2</option>
        <option value="LT2">LT2</option>
        <option value="HT3">HT3</option>
        <option value="LT3">LT3</option>
        <option value="Retired">Retired</option>
      </select>
      <select class="form-select" style="width:150px" id="sort-filter" onchange="renderPlayers()">
        <option value="winrate">Sort: Winrate</option>
        <option value="wins">Sort: Wins</option>
        <option value="days_held">Sort: Days Held</option>
        <option value="points">Sort: Points</option>
      </select>
    </div>
  </div>

  <div id="players-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;"></div>
</div>

<script src="../js/config.js"></script>
<script>
if (localStorage.getItem('pvp-dark') === '1') document.documentElement.classList.add('dark');
function toggleTheme() { const d = document.documentElement.classList.toggle('dark'); localStorage.setItem('pvp-dark', d?'1':'0'); }
handleAuthCallback();
function renderNav() {
  const user = Auth.getUser();
  document.getElementById('nav-auth').innerHTML = user
    ? `<div class="nav-user"><img src="${avatarUrl(user.discordId,user.avatar)}"><span>${user.discordName}</span><span class="role-badge ${user.role}">${user.role}</span></div><button class="btn btn-ghost btn-sm" onclick="Auth.clear();location.reload()">Logout</button>`
    : `<a href="${CONFIG.API_BASE}/auth/discord" class="btn discord-btn btn-sm">Login</a>`;
  if (Auth.isStaff()) document.getElementById('nav-management').style.display='';
}
renderNav();

let allPlayers = [];

async function loadPlayers() {
  const data = await api('/api/public/leaderboard?sort=winrate&limit=50');
  // We need full player list — fetch from a dedicated list endpoint
  // Fallback: use leaderboard data
  allPlayers = data.players || [];
  renderPlayers();
}

function renderPlayers() {
  const search = document.getElementById('search').value.toLowerCase();
  const tier = document.getElementById('tier-filter').value;
  const sort = document.getElementById('sort-filter').value;
  const grid = document.getElementById('players-grid');

  let filtered = allPlayers.filter(p =>
    (!search || p.ign.toLowerCase().includes(search)) &&
    (!tier || p.tier === tier)
  );

  filtered.sort((a, b) => (b[sort] || 0) - (a[sort] || 0));
  document.getElementById('player-count').textContent = `${filtered.length} players`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⚔</div><div>No players found</div></div>';
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="card" style="cursor:pointer;padding:18px;" onclick="location.href='player.html?ign=${p.ign}'">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <img src="${p.skinUrl||'https://mc-heads.net/avatar/steve/48'}" class="skin-img" style="width:48px;height:48px;" onerror="this.src='https://mc-heads.net/avatar/steve/48'">
        <div>
          <div style="font-weight:900;font-size:15px;">${p.ign}</div>
          <div>${tierBadge(p.tier||'None')}</div>
        </div>
        <div style="margin-left:auto;font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--blue)">${formatWinrate(p.value||p.winrate||0)}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:12px;">
        <div style="text-align:center;"><div style="color:var(--text3);font-size:10px;margin-bottom:2px;">WINS</div><div style="font-weight:700;color:var(--green)">${p.wins||0}</div></div>
        <div style="text-align:center;"><div style="color:var(--text3);font-size:10px;margin-bottom:2px;">LOSSES</div><div style="font-weight:700;color:var(--red)">${p.losses||0}</div></div>
        <div style="text-align:center;"><div style="color:var(--text3);font-size:10px;margin-bottom:2px;">RANK</div><div style="font-weight:700;color:var(--amber)">#${p.rank||'—'}</div></div>
      </div>
    </div>
  `).join('');
}

loadPlayers();
</script>
</body>
</html>
